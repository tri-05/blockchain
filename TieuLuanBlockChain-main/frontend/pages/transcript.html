<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý bảng điểm</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="../js/web3.js"></script>
  <script src="../js/contract.js"></script>
  <script src="../js/app.js"></script>

  <script>
  tailwind.config = {
    theme: {
      extend: {
        boxShadow: {
          soft: "0 20px 40px rgba(0,0,0,0.08)"
        }
      }
    }
  }
  </script>
</head>

<body onload="initWeb3()" class="bg-gradient-to-br from-purple-100 via-indigo-100 to-purple-200 min-h-screen py-10">

  <!-- HEADER -->
  <header class="max-w-3xl mx-auto mb-6 px-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-extrabold text-purple-700">📊 Quản lý bảng điểm</h1>
      <p class="text-sm text-gray-600">Ghi nhận và tra cứu điểm trên Blockchain</p>
    </div>

    <div id="walletStatus"
      class="text-sm px-4 py-2 bg-white/80 backdrop-blur rounded-xl shadow-soft text-gray-600">
      🔌 Chưa kết nối ví
    </div>
  </header>

  <!-- CARD -->
  <main class="max-w-3xl mx-auto bg-white/80 backdrop-blur p-8 rounded-3xl shadow-soft">

    <!-- ADD SCORE -->
    <section class="mb-8">
      <h2 class="font-bold text-purple-700 mb-4 flex items-center gap-2">
        ➕ Thêm điểm
      </h2>

      <div class="grid gap-4 md:grid-cols-2">
        <input id="transWallet"
          class="border rounded-xl px-4 py-2 focus:ring-2 focus:ring-purple-400 outline-none"
          placeholder="Địa chỉ ví sinh viên">

        <input id="subject"
          class="border rounded-xl px-4 py-2 focus:ring-2 focus:ring-purple-400 outline-none"
          placeholder="Môn học">

        <input id="score"
          class="border rounded-xl px-4 py-2 focus:ring-2 focus:ring-purple-400 outline-none"
          placeholder="Điểm">

        <button onclick="addTranscript()"
          class="bg-purple-500 text-white py-2 rounded-xl hover:bg-purple-600 transition font-semibold shadow">
          Ghi lên Blockchain
        </button>
      </div>
    </section>

    <hr class="my-6">

    <!-- SEARCH TRANSCRIPT -->
    <section>
      <h2 class="font-bold text-indigo-700 mb-4 flex items-center gap-2">
        🔍 Tra cứu bảng điểm
      </h2>

      <input id="checkTransWallet"
        class="w-full border rounded-xl px-4 py-2 mb-4 focus:ring-2 focus:ring-indigo-400 outline-none"
        placeholder="Nhập địa chỉ ví sinh viên">

      <div class="flex gap-3">
        <button onclick="getTranscript()"
          class="flex-1 bg-indigo-500 text-white py-2 rounded-xl hover:bg-indigo-600 transition font-semibold shadow">
          Xem bảng điểm
        </button>

        <a href="../index.html"
          class="py-2 px-4 bg-gray-100 rounded-xl hover:bg-gray-200 transition">
          ⬅ Trang chủ
        </a>
      </div>

      <!-- RESULT CARD -->
      <div id="resultCard"
        class="mt-6 hidden bg-gradient-to-br from-purple-50 to-indigo-50 border border-purple-100 p-5 rounded-2xl shadow">

        <h3 class="font-bold text-gray-700 mb-2">Bảng điểm</h3>

        <pre id="transResult"
          class="text-sm text-gray-800 whitespace-pre-wrap"></pre>
      </div>
    </section>

  </main>

  <script src="../js/ui.js"></script>

</body>
</html>
