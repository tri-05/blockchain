<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý văn bằng</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="../js/web3.js"></script>
  <script src="../js/contract.js"></script>
  <script src="../js/app.js"></script>

  <script>
  tailwind.config = {
    theme: {
      extend: {
        boxShadow: {
          soft: "0 20px 40px rgba(0,0,0,0.08)"
        }
      }
    }
  }
  </script>
</head>

<body onload="initWeb3()" class="bg-gradient-to-br from-indigo-100 via-purple-100 to-green-100 min-h-screen py-10">

  <!-- HEADER -->
  <header class="max-w-3xl mx-auto mb-6 px-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-extrabold text-indigo-700">📜 Quản lý văn bằng</h1>
      <p class="text-sm text-gray-600">Cấp và xác thực văn bằng trên Blockchain</p>
    </div>

    <div id="walletStatus"
      class="text-sm px-4 py-2 bg-white/80 backdrop-blur rounded-xl shadow-soft text-gray-600">
      🔌 Chưa kết nối ví
    </div>
  </header>

  <!-- CARD -->
  <main class="max-w-3xl mx-auto bg-white/80 backdrop-blur p-8 rounded-3xl shadow-soft">

    <!-- ADD DEGREE -->
    <section class="mb-8">
      <h2 class="font-bold text-green-700 mb-4 flex items-center gap-2">
        ➕ Cấp văn bằng
      </h2>

      <div class="grid gap-4 md:grid-cols-2">
        <input id="degreeWallet"
          class="border rounded-xl px-4 py-2 focus:ring-2 focus:ring-green-400 outline-none"
          placeholder="Địa chỉ ví sinh viên">

        <input id="degreeName"
          class="border rounded-xl px-4 py-2 focus:ring-2 focus:ring-green-400 outline-none"
          placeholder="Tên văn bằng">

        <input id="degreeYear"
          class="border rounded-xl px-4 py-2 focus:ring-2 focus:ring-green-400 outline-none"
          placeholder="Năm tốt nghiệp">

        <button onclick="addDegree()"
          class="bg-green-500 text-white py-2 rounded-xl hover:bg-green-600 transition font-semibold shadow">
          Ghi lên Blockchain
        </button>
      </div>
    </section>

    <hr class="my-6">

    <!-- CHECK DEGREE -->
    <section>
      <h2 class="font-bold text-indigo-700 mb-4 flex items-center gap-2">
        🔍 Tra cứu văn bằng
      </h2>

      <input id="checkDegreeWallet"
        class="w-full border rounded-xl px-4 py-2 mb-4 focus:ring-2 focus:ring-indigo-400 outline-none"
        placeholder="Nhập địa chỉ ví sinh viên">

      <div class="flex gap-3">
        <button onclick="getDegree()"
          class="flex-1 bg-indigo-500 text-white py-2 rounded-xl hover:bg-indigo-600 transition font-semibold shadow">
          Xem văn bằng
        </button>

        <a href="../index.html"
          class="py-2 px-4 bg-gray-100 rounded-xl hover:bg-gray-200 transition">
          ⬅ Trang chủ
        </a>
      </div>

      <!-- RESULT CARD -->
      <div id="resultCard"
        class="mt-6 hidden bg-gradient-to-br from-indigo-50 to-green-50 border border-indigo-100 p-5 rounded-2xl shadow">

        <h3 class="font-bold text-gray-700 mb-2">Kết quả</h3>

        <pre id="degreeResult"
          class="text-sm text-gray-800 whitespace-pre-wrap"></pre>
      </div>
    </section>

  </main>

  <script src="../js/ui.js"></script>

</body>
</html>
